name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Backend – lint, test & build
  # ──────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for security vulnerabilities
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Verify server can be imported (syntax check)
        run: node --check src/server.js
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_ACCESS_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          FRONTEND_URL: http://localhost:3000

      - name: Run tests
        run: npm test
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Frontend – lint, test & build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build production bundle
        run: npm run build
        env:
          CI: true
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL || 'http://localhost:5000/api' }}

  # ──────────────────────────────────────────────
  # Deploy (only on push to main)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "✅ All CI checks passed!"
          echo "🚀 Ready to deploy."
          echo ""
          echo "To enable auto-deploy, replace this step with your deployment"
          echo "provider (Vercel, Render, Railway, AWS, etc.)."
          echo ""
          echo "Example – deploy frontend to Vercel:"
          echo "  uses: amondnet/vercel-action@v25"
          echo ""
          echo "Example – deploy backend to Render:"
          echo "  uses: johnbeynon/render-deploy-action@v0.0.8"
